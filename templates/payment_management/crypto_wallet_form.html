<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Crypto Wallet - LAWCOLAB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .main-header { background: linear-gradient(135deg, #0066cc 0%, #004499 100%); color: white; padding: 2rem 0; }
        .form-card { background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 2rem; }
        .network-info { background: #f8f9fa; border-radius: 8px; padding: 1rem; margin: 1rem 0; }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="main-header">
        <div class="container">
            <div class="row align-items-center">
                <div class="col">
                    <h1><i class="fas fa-plus me-2"></i>Add Crypto Wallet</h1>
                    <p class="mb-0">Configure a new cryptocurrency wallet for payments</p>
                </div>
                <div class="col-auto">
                    <a href="{{ url_for('payment_management.manage_crypto_wallets') }}" class="btn btn-outline-light">
                        <i class="fas fa-arrow-left me-1"></i>Back to Wallets
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="form-card">
                    <form method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label"><strong>Currency *</strong></label>
                                <select class="form-select" name="currency" required onchange="updateNetworkOptions()">
                                    <option value="">Select Currency</option>
                                    <option value="USDT" {{ 'selected' if (request.args.get('currency') == 'USDT') or (wallet and wallet.currency == 'USDT') }}>USDT (Tether)</option>
                                    <option value="TON" {{ 'selected' if (request.args.get('currency') == 'TON') or (wallet and wallet.currency == 'TON') }}>TON (The Open Network)</option>
                                    <option value="AVAX" {{ 'selected' if (request.args.get('currency') == 'AVAX') or (wallet and wallet.currency == 'AVAX') }}>AVAX (Avalanche)</option>
                                    <option value="SOL" {{ 'selected' if (request.args.get('currency') == 'SOL') or (wallet and wallet.currency == 'SOL') }}>SOL (Solana)</option>
                                    <option value="BTC">BTC (Bitcoin)</option>
                                    <option value="ETH">ETH (Ethereum)</option>
                                    <option value="BNB">BNB (Binance Coin)</option>
                                    <option value="MATIC">MATIC (Polygon)</option>
                                </select>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label class="form-label"><strong>Network *</strong></label>
                                <select class="form-select" name="network" required id="networkSelect">
                                    <option value="">Select Network</option>
                                    <!-- Options will be populated by JavaScript -->
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label"><strong>Wallet Address *</strong></label>
                            <input type="text" class="form-control" name="wallet_address" required 
                                   placeholder="Enter the wallet address for receiving payments" 
                                   value="{{ wallet.wallet_address if wallet else '' }}"
                                   style="font-family: 'Courier New', monospace;">
                            <div class="form-text">This is where payments will be sent. Double-check this address!</div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label"><strong>Minimum Confirmations</strong></label>
                                <input type="number" class="form-control" name="minimum_confirmations" value="{{ wallet.minimum_confirmations if wallet else 6 }}" min="1" max="50">
                                <div class="form-text">Number of confirmations required before payment is considered complete</div>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <div class="form-check form-switch mt-4">
                                    <input class="form-check-input" type="checkbox" name="is_active" {{ 'checked' if not wallet or wallet.is_active }}>
                                    <label class="form-check-label"><strong>Active</strong></label>
                                    <div class="form-text">Wallet will be available for payments</div>
                                </div>
                            </div>
                        </div>

                        <!-- Network Information -->
                        <div class="network-info" id="networkInfo" style="display: none;">
                            <h5><i class="fas fa-info-circle text-info me-2"></i>Network Information</h5>
                            <div id="networkDetails"></div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-1"></i>Save Wallet
                            </button>
                            <a href="{{ url_for('payment_management.manage_crypto_wallets') }}" class="btn btn-secondary">
                                <i class="fas fa-times me-1"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const networkOptions = {
            'USDT': [
                { value: 'Tron', text: 'Tron Network (TRC20) - Ultra low fees', info: 'TRC20 USDT on Tron Network - Ultra-low transaction fees, fast confirmations' },
                { value: 'TON', text: 'TON Network - Fast & Cheap', info: 'USDT on TON Network - Lightning fast, minimal fees' },
                { value: 'BSC', text: 'Binance Smart Chain (BEP20)', info: 'BEP20 USDT on BSC - Low fees, fast transactions' },
                { value: 'Solana', text: 'Solana Network - Lightning fast', info: 'USDT on Solana - Ultra-fast transactions with minimal fees' },
                { value: 'Avalanche', text: 'Avalanche C-Chain', info: 'USDT on Avalanche - High-speed network with low fees' },
                { value: 'Ethereum', text: 'Ethereum (ERC20) - Most secure', info: 'ERC20 USDT on Ethereum - Most secure, higher fees during congestion' }
            ],
            'TON': [
                { value: 'TON', text: 'TON Network - The Open Network', info: 'TON native network - Ultra-fast blockchain payments with minimal fees' }
            ],
            'AVAX': [
                { value: 'Avalanche', text: 'Avalanche C-Chain', info: 'AVAX on Avalanche C-Chain - High-speed network with low fees' }
            ],
            'SOL': [
                { value: 'Solana', text: 'Solana Network', info: 'SOL on Solana - Lightning-fast transactions with minimal fees' }
            ],
            'BTC': [
                { value: 'Bitcoin', text: 'Bitcoin Network', info: 'Native Bitcoin network - Most secure, slower confirmations' }
            ],
            'ETH': [
                { value: 'Ethereum', text: 'Ethereum Network', info: 'Native Ethereum network - Secure, higher fees during congestion' }
            ],
            'BNB': [
                { value: 'BSC', text: 'Binance Smart Chain', info: 'BNB on BSC - Fast and low-cost transactions' }
            ],
            'MATIC': [
                { value: 'Polygon', text: 'Polygon Network', info: 'MATIC on Polygon - Very low fees and fast transactions' }
            ]
        };

        function updateNetworkOptions() {
            const currencySelect = document.querySelector('select[name="currency"]');
            const networkSelect = document.getElementById('networkSelect');
            const networkInfo = document.getElementById('networkInfo');
            const networkDetails = document.getElementById('networkDetails');
            
            const currency = currencySelect.value;
            
            // Clear existing options
            networkSelect.innerHTML = '<option value="">Select Network</option>';
            
            if (currency && networkOptions[currency]) {
                networkOptions[currency].forEach(option => {
                    const optionElement = document.createElement('option');
                    optionElement.value = option.value;
                    optionElement.textContent = option.text;
                    networkSelect.appendChild(optionElement);
                });
                
                // Pre-select if URL parameter exists
                const urlNetwork = '{{ request.args.get("network", "") }}';
                if (urlNetwork) {
                    networkSelect.value = urlNetwork;
                    showNetworkInfo(urlNetwork);
                }
            }
        }

        function showNetworkInfo(network) {
            const currencySelect = document.querySelector('select[name="currency"]');
            const currency = currencySelect.value;
            const networkInfo = document.getElementById('networkInfo');
            const networkDetails = document.getElementById('networkDetails');
            
            if (currency && networkOptions[currency]) {
                const option = networkOptions[currency].find(opt => opt.value === network);
                if (option) {
                    networkDetails.innerHTML = `<p class="mb-0">${option.info}</p>`;
                    networkInfo.style.display = 'block';
                } else {
                    networkInfo.style.display = 'none';
                }
            }
        }

        // Event listener for network selection
        document.getElementById('networkSelect').addEventListener('change', function() {
            showNetworkInfo(this.value);
        });

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            updateNetworkOptions();
        });
    </script>
</body>
</html>
