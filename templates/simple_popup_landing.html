<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAWCOLAB - Transform Your Legal Practice</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #ffffff;
            overflow-x: hidden;
        }
        
        .hero-section {
            padding: 80px 20px;
            background: linear-gradient(135deg, #f8fafc 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        
        .hero-content h1 {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1.1;
            color: #1a1a1a;
            margin-bottom: 1.5rem;
        }
        
        .hero-content p {
            font-size: 1.25rem;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 2rem;
            max-width: 480px;
        }
        
        .btn-primary-custom {
            background: #0066cc;
            border: none;
            padding: 16px 32px;
            border-radius: 10px;
            font-weight: 600;
            color: white;
            text-decoration: none;
            display: inline-block;
            margin-right: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,102,204,0.3);
            transition: all 0.3s ease;
        }
        
        .btn-primary-custom:hover {
            transform: translateY(-2px);
            color: white;
        }
        
        .btn-outline-custom {
            border: 2px solid #0066cc;
            background: transparent;
            color: #0066cc;
            padding: 14px 32px;
            border-radius: 10px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            margin-right: 15px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .btn-outline-custom:hover {
            background: #0066cc;
            color: white;
        }
        
        .hero-visual {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            margin-top: 2rem;
        }
        
        @media (max-width: 768px) {
            .hero-content h1 {
                font-size: 2.5rem;
            }
            .hero-content p {
                font-size: 1.1rem;
            }
            .hero-section {
                padding: 40px 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Simple Clean Landing Page -->
    <section class="hero-section">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-6">
                    <div class="hero-content">
                        <h1>
                            Legal practice <br>
                            <span style="color: #0066cc;">made simple</span>
                        </h1>
                        <p>
                            All-in-one platform for legal practitioners and law firms to manage operations, clients, teams, projects, cases, invoices, communication, and collaboration.
                        </p>
                        <div class="hero-actions">
                            <a href="/auth/signup" class="btn-primary-custom">
                                <i class="fas fa-rocket me-2"></i>Start Free Trial
                            </a>
                            <button onclick="showPopup()" class="btn-outline-custom">
                                <i class="fas fa-star me-2"></i>Pre-Sale Launch
                            </button>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="hero-visual">
                        <div style="display: flex; align-items: center; margin-bottom: 1.5rem;">
                            <div style="background: #0066cc; border-radius: 8px; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; margin-right: 1rem;">
                                <i class="fas fa-balance-scale" style="color: white; font-size: 1.5rem;"></i>
                            </div>
                            <div>
                                <h4 style="margin: 0; font-size: 1.25rem; color: #1a1a1a;">LAWCOLAB</h4>
                                <p style="margin: 0; color: #64748b; font-size: 0.9rem;">Professional workspace</p>
                            </div>
                        </div>
                        
                        <div style="border: 1px solid #e2e8f0; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem;">
                            <div style="display: flex; align-items: center; margin-bottom: 1rem;">
                                <div style="background: #f1f5f9; border-radius: 6px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; margin-right: 0.75rem;">
                                    <i class="fas fa-users" style="color: #0066cc; font-size: 0.9rem;"></i>
                                </div>
                                <span style="color: #334155; font-weight: 500;">Team Management</span>
                            </div>
                            <div style="display: flex; align-items: center; margin-bottom: 1rem;">
                                <div style="background: #f1f5f9; border-radius: 6px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; margin-right: 0.75rem;">
                                    <i class="fas fa-comments" style="color: #0066cc; font-size: 0.9rem;"></i>
                                </div>
                                <span style="color: #334155; font-weight: 500;">Real-time Chat</span>
                            </div>
                            <div style="display: flex; align-items: center;">
                                <div style="background: #f1f5f9; border-radius: 6px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; margin-right: 0.75rem;">
                                    <i class="fas fa-folder" style="color: #0066cc; font-size: 0.9rem;"></i>
                                </div>
                                <span style="color: #334155; font-weight: 500;">Project Collaboration</span>
                            </div>
                        </div>
                        
                        <button style="background: #0066cc; color: white; width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer;">
                            Access Dashboard
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        let popupTimer = null;
        let popupShown = false;

        // Auto-show popup after 7 seconds
        {% if auto_popup %}
        console.log("Server says show popup, initializing timer for 7 seconds...");
        popupTimer = setTimeout(function() {
            if (!popupShown) {
                console.log("7 seconds passed, showing popup...");
                showPopup();
            }
        }, 7000);
        {% endif %}

        function showPopup() {
            if (popupShown) return;
            popupShown = true;
            if (popupTimer) clearTimeout(popupTimer);
            
            // Redirect to full popup page to avoid any content mixing
            window.location.href = '/sales/popup';
        }

        // Clean up on page unload
        window.addEventListener('beforeunload', function() {
            if (popupTimer) clearTimeout(popupTimer);
        });
    </script>
</body>
</html>
