[phases.setup]
nixPkgs = [
  "python311",
  "python311Packages.pip",
  "gcc",
  "pkg-config",
  "fontconfig",
  "freetype",
  "pango",
  "harfbuzz",
  "glib",
  "libxcrypt",
  "ghostscript",
]

[phases.install]
cmds = ["python3 -m pip install -r requirements.txt"]

[start]
cmd = "gunicorn --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 120 --preload main:app"
